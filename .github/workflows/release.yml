name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true
        default: ''

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  ############################
  # 1. Verify tag and build artifacts
  ############################
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: set
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Version is required"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Validate semver
        run: |
          VERSION="${{ steps.set.outputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$'; then
            echo "::error::Version '$VERSION' is not valid semver"
            exit 1
          fi

  ############################
  # 2. Build release artifacts
  ############################
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run full test suite
        run: npm test -- --ci --runInBand --coverage

      - name: Build source tarball
        run: |
          mkdir -p artifacts
          VERSION="${{ needs.verify.outputs.version }}"
          tar --exclude='./node_modules' \
              --exclude='./coverage' \
              --exclude='./.git' \
              --exclude='./artifacts' \
              -czf "artifacts/ci-cd-demo-app-${VERSION}.tar.gz" \
              .

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/
          retention-days: 90

  ############################
  # 3. Generate changelog
  ############################
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [verify]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog entry
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          node scripts/release/generate-changelog.js --version "$VERSION" --write docs/CHANGELOG.md

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: docs/CHANGELOG.md
          retention-days: 90

  ############################
  # 4. Create GitHub release
  ############################
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify, build, changelog]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: docs/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.verify.outputs.version }}
          name: Release v${{ needs.verify.outputs.version }}
          body_path: docs/CHANGELOG.md
          draft: false
          prerelease: ${{ contains(needs.verify.outputs.version, '-') }}
          files: |
            artifacts/ci-cd-demo-app-${{ needs.verify.outputs.version }}.tar.gz
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
